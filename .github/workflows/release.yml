name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-dev.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Detect release channel
        id: channel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-dev."* ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected dev release: $TAG"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable release: $TAG"
          fi

      - name: Sync package.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set package.json version to ${VERSION}"

      - run: npm ci

      - run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - run: npm run build

      - name: Bundle website and zip dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/sync-website-version.sh
          cp docs/website/index.html dist/website.html
          cd dist
          zip -r "../safeclaw-${VERSION}.zip" .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          PRERELEASE="${{ steps.channel.outputs.prerelease }}"

          TITLE="SafeClaw v${VERSION}"
          if [ "$CHANNEL" = "dev" ]; then
            TITLE="SafeClaw v${VERSION} (Dev)"
          fi

          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # If the release already exists (created via UI), upload the asset to it.
          # Otherwise, create a new release.
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release upload "$GITHUB_REF_NAME" "safeclaw-${VERSION}.zip" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "safeclaw-${VERSION}.zip" \
              --title "$TITLE" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
