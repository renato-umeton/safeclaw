name: Version Docs Check

on:
  pull_request:
    branches: [master]

jobs:
  check-version-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bash scripts/check-version-docs.sh origin/master
